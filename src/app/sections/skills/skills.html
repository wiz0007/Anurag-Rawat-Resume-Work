<section
  class="skills section"
  id="skills"
>

  <div class="container">

    <div class="section-header">

      <span class="section-tag">
        Core Expertise
      </span>

      <h2>
        HR Skills & Professional Competencies
      </h2>

    </div>

    <div class="skills-grid">

      @for(skill of skills; track skill){

        <div class="skill-card">

          {{ skill }}

        </div>

      }

    </div>

  </div>

</section>
