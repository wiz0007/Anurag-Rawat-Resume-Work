<section
  class="achievements section"
  id="achievements"
>

  <div class="container">

    <div class="section-header" appReveal>

      <span class="section-tag">
        Achievements
      </span>

      <h2>
        Impact & Contributions
      </h2>

    </div>

    <div class="stats-grid">

      @for(item of achievements; track item.label){

      <div class="stat-card" appReveal>

        <h3>
          {{ item.value }}
        </h3>

        <p>
          {{ item.label }}
        </p>

      </div>

      }

    </div>

  </div>

</section>
