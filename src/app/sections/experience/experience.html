<section
  class="experience section"
  id="experience"
>
  <div class="container">

    <div class="section-header" appReveal>
      <span class="section-tag">
        Experience
      </span>

      <h2>
        Professional Journey
      </h2>
    </div>

    <div class="timeline">

      @for(item of experiences; track item.role){

      <div class="timeline-item" appReveal>

        <div class="timeline-dot"></div>

        <div class="timeline-card">

          <span class="duration">
            {{ item.duration }}
          </span>

          <h3>
            {{ item.role }}
          </h3>

          <h4>
            {{ item.company }}
          </h4>

          <ul>

            @for(point of item.points; track point){

            <li>{{ point }}</li>

            }

          </ul>

        </div>

      </div>

      }

    </div>

  </div>
</section>
